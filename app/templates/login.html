<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập · Trading System</title>

  <!-- Bootstrap + Font Awesome (icon tinh tế trong ô nhập) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --brand:#2563eb;          /* xanh chủ đạo, đồng bộ sidebar */
      --brand-dark:#1d4ed8;
      --bg:#f4f6f9;             /* nền xám nhạt tối giản */
    }

    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    /* ===== Thẻ đăng nhập căn giữa ===== */
    .login-card{
      width:100%;
      max-width:400px;
      background:#fff;
      border:1px solid #e6e9ef;
      border-radius:16px;
      box-shadow:0 12px 40px rgba(31,45,80,.10);
      padding:36px 32px 32px;
    }

    /* ===== Tiêu đề + logo ===== */
    .login-head{ text-align:center; margin-bottom:26px; }
    .login-logo{
      font-size:40px;
      line-height:1;
      display:inline-block;
      margin-bottom:10px;
    }
    .login-title{
      font-size:1.35rem;
      font-weight:700;
      color:#1e293b;
      letter-spacing:-.3px;
      margin:0;
    }
    .login-sub{
      font-size:.85rem;
      color:#94a3b8;
      margin-top:4px;
    }

    /* ===== Ô nhập liệu bo góc + icon đầu ô ===== */
    .field{ margin-bottom:16px; }
    .field label{
      font-size:.78rem;
      font-weight:600;
      color:#475569;
      margin-bottom:6px;
      display:block;
    }
    .input-wrap{ position:relative; }
    .input-wrap .fa-solid{
      position:absolute;
      top:50%;
      left:14px;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:.9rem;
      pointer-events:none;
    }
    .input-wrap input{
      width:100%;
      height:46px;
      border:1px solid #dfe3ea;
      border-radius:10px;
      padding:0 14px 0 40px;
      font-size:.95rem;
      color:#1e293b;
      background:#fbfcfe;
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .input-wrap input::placeholder{ color:#aab2c0; }
    .input-wrap input:focus{
      outline:none;
      border-color:var(--brand);
      background:#fff;
      box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }

    /* ===== Nút đăng nhập ===== */
    .btn-signin{
      width:100%;
      height:46px;
      border:none;
      border-radius:10px;
      background:var(--brand);
      color:#fff;
      font-weight:600;
      font-size:.98rem;
      cursor:pointer;
      transition:background .18s ease, transform .05s ease, box-shadow .18s ease;
    }
    .btn-signin:hover{
      background:var(--brand-dark);
      box-shadow:0 6px 18px rgba(37,99,235,.35);
    }
    .btn-signin:active{ transform:translateY(1px); }

    /* ===== Alert lỗi nhỏ gọn, nằm trong thẻ ===== */
    .login-alert{
      display:flex;
      align-items:center;
      gap:8px;
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
      border-radius:10px;
      padding:10px 12px;
      font-size:.85rem;
      margin-bottom:16px;
    }

    .login-foot{
      text-align:center;
      margin-top:22px;
      font-size:.75rem;
      color:#b0b8c4;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-head">
      <div class="login-logo">📈</div>
      <h1 class="login-title">Trading System Dashboard</h1>
      <div class="login-sub">Đăng nhập để tiếp tục quản lý danh mục</div>
    </div>

    <form method="post" novalidate>
      {# Alert lỗi: hiển thị ngay phía trên nút, không làm vỡ layout #}
      {% with msgs = get_flashed_messages() %}
        {% for m in msgs %}
          <div class="login-alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ m }}</span>
          </div>
        {% endfor %}
      {% endwith %}

      <div class="field">
        <label for="username">Tài khoản</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="username" name="username"
                 value="admin" autocomplete="username">
        </div>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password..." autocomplete="current-password" autofocus>
        </div>
      </div>

      <button type="submit" class="btn-signin">
        <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
      </button>
    </form>

    <div class="login-foot">© 2026 Trading System · Bảo mật nội bộ</div>
  </div>
</body>
</html>
