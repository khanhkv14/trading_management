{% extends layout|default("base.html") %}
{% block content %}
<div class="view-header"><h4>Dashboard</h4></div>
<div class="row g-3 mb-4">
  <div class="col-6 col-md-3"><div class="card p-3"><div>Closed Positions</div><div class="stat">{{ total }}</div></div></div>
  <div class="col-6 col-md-3"><div class="card p-3"><div>Win Rate</div><div class="stat">{{ win_rate }}%</div></div></div>
  <div class="col-6 col-md-3"><div class="card p-3"><div>Total PnL</div><div class="stat {{ 'win' if total_pnl>=0 else 'loss' }}">{{ total_pnl|fmt }}</div></div></div>
  <div class="col-6 col-md-3"><div class="card p-3"><div>Open Positions</div><div class="stat">{{ open_count }}</div></div></div>
</div>
<div class="row g-3">
  <div class="col-md-7"><div class="card p-3"><b>Cumulative PnL (by Close Date)</b>
    <div class="chart-box"><canvas id="c1"></canvas></div></div></div>
  <div class="col-md-5"><div class="card p-3"><b>PnL by Ticker</b>
    <div class="chart-box"><canvas id="c2"></canvas></div></div></div>
</div>
{% endblock %}

{% block scripts %}
<!-- Chart.js CHỈ nạp ở trang có biểu đồ -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const AX  = { ticks:{ color:'#64748b' }, grid:{ color:'rgba(148,163,184,.22)' } };
// animation:false -> biểu đồ hiện NGAY, không "bò" ~1s mỗi lần mở tab (hết giật
// khi chuyển sang Dashboard, đồng thời resize cũng tức thì thay vì chạy animation).
const BASE = { responsive:true, maintainAspectRatio:false, animation:false };

new Chart(document.getElementById('c1'), {
  type: 'line',
  data: { labels: {{ labels|tojson }}, datasets: [{ label: 'P&L', data: {{ cum|tojson }},
    borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,.12)', fill: true, tension: .2 }] },
  options: { ...BASE, plugins: { legend: { labels: { color: '#334155' } } },
    scales: { x: AX, y: AX } }
});
new Chart(document.getElementById('c2'), {
  type: 'bar',
  data: { labels: {{ pair_labels|tojson }}, datasets: [{ label: 'P&L', data: {{ pair_vals|tojson }},
    backgroundColor: '#2563eb' }] },
  options: { ...BASE, plugins: { legend: { display: false } }, scales: { x: AX, y: AX } }
});
</script>
{% endblock %}
